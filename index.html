<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#ffffff;color:#1E2A4A;min-height:100vh;font-size:13px}
.app-header{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 28px;background:#fff;border-bottom:1px solid #EDEFF8;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(37,99,235,.06)}
.header-left{display:flex;align-items:center;gap:14px}
.app-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;border:1px solid #EDEFF8;box-shadow:0 2px 6px rgba(37,99,235,.10);padding:5px}
.app-logo img{width:100%;height:100%;object-fit:contain}
.app-title{font-size:16.5px;font-weight:700;color:#1E2A4A;letter-spacing:-.02em}
.app-sub{font-size:10.5px;color:#8A93B8;margin-top:1px}
.main-content{padding:22px 28px;max-width:1600px;margin:0 auto}
.subtab-nav{display:flex;gap:4px;background:#F8F9FE;border:1px solid #EDEFF8;border-radius:12px;padding:5px;margin-bottom:20px;width:fit-content;flex-wrap:wrap}
.subtab-btn{padding:8px 18px;border:none;background:transparent;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:#7079A0;transition:all .18s;font-family:inherit;white-space:nowrap}
.subtab-btn.active{background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.35)}
.subtab-btn:hover:not(.active){background:#EEF1FF;color:#1D4ED8}
.card{background:#fff;border:1px solid #EDEFF8;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(30,41,74,.04)}
.card-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#7079A0;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-hdr .card-title{margin-bottom:0}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.kpi-card{background:#fff;border:1px solid #EDEFF8;border-radius:12px;padding:15px 17px;border-top:4px solid #2563EB;box-shadow:0 2px 8px rgba(30,41,74,.05);transition:transform .15s,box-shadow .15s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(37,99,235,.12)}
.kpi-grid .kpi-card:nth-of-type(4n+1){border-top-color:#2563EB}
.kpi-grid .kpi-card:nth-of-type(4n+2){border-top-color:#FB7185}
.kpi-grid .kpi-card:nth-of-type(4n+3){border-top-color:#14B8A6}
.kpi-grid .kpi-card:nth-of-type(4n+4){border-top-color:#F59E0B}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#8A93B8;font-weight:700;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;color:#1E2A4A;font-family:'Courier New',monospace;line-height:1}
.kpi-sub{font-size:10px;color:#A4ABC9;margin-top:4px}
.stat-bar{display:flex;align-items:center;gap:16px;padding:13px 18px;background:#F8F9FE;border:1px solid #EDEFF8;border-radius:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#A4ABC9;font-weight:700}
.stat-val{font-size:16px;font-weight:800;color:#1E2A4A;font-family:'Courier New',monospace}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#A4ABC9}
.sel{padding:6px 11px;border:1px solid #E2E5F5;border-radius:8px;font-size:11.5px;background:#fff;color:#374151;cursor:pointer;font-family:inherit;outline:none}
.sel:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.grid-wrap{overflow-x:auto;overflow-y:auto;border:1px solid #EDEFF8;border-radius:12px;max-height:560px}.grid-wrap.page-scroll{overflow-x:auto;overflow-y:auto;max-height:75vh}
.dg{border-collapse:collapse;font-size:11px;min-width:100%;background:#fff}
.dg th{background:#F8F9FE;border-bottom:2px solid #EDEFF8;border-right:1px solid #F1F2FA;padding:8px 10px;text-align:right;font-weight:700;color:#5B6390;white-space:nowrap;position:sticky;top:0;z-index:2}
.dg th.lc{text-align:left;position:sticky;top:0;left:0;z-index:4;background:#F8F9FE;border-right:2px solid #EDEFF8;min-width:200px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dg td{border-bottom:1px solid #F4F5FB;border-right:1px solid #F4F5FB;padding:5px 10px;text-align:right;color:#374151;font-family:'Courier New',monospace;white-space:nowrap}
.dg td.lc{text-align:left;font-family:inherit;font-weight:500;color:#1E2A4A;position:sticky;left:0;z-index:1;background:#fff;border-right:2px solid #EDEFF8;min-width:200px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dg tr:hover td{background:#F5F6FE!important}
.dg tr:hover td.lc{background:#F5F6FE!important}
.dg tfoot td{background:#1E2A4A!important;color:#fff;font-weight:700;border-color:#2D3A63;position:sticky;bottom:0;z-index:2}
.dg tfoot td.lc{background:#1E2A4A!important;position:sticky;bottom:0;left:0;z-index:3}
.tr-state td{background:#EEF1FF!important;cursor:pointer;user-select:none}
.tr-state td.lc{background:#EEF1FF!important;font-weight:700;color:#1E2A4A}
.tr-state:hover td{background:#E0E5FF!important}
.tr-state:hover td.lc{background:#E0E5FF!important}
.tr-model td{background:#fff}
.tr-model td.lc{background:#fff;padding-left:28px;color:#374151;font-size:10.5px}
.chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{position:relative;height:250px}
@media(max-width:900px){.chart-pair{grid-template-columns:1fr}}
.signal-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#5B6390;padding:11px 15px;background:#F8F9FE;border-radius:10px;border:1px solid #EDEFF8;margin-bottom:12px}
.sig-item{display:flex;align-items:center;gap:5px}
.sig-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;background:#EEF1FF;color:#1D4ED8}
.tag-amber{background:#FFF8EC;color:#B45309}
.tag-green{background:#EFFCF6;color:#0F8A5F}
.tag-rose{background:#FFF0F2;color:#E11D48}
.data-label{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:#EFFCF6;border:1px solid #B9F0D8;border-radius:8px;font-size:11px;font-weight:700;color:#0F8A5F}
.warn-banner{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:#FFF8EC;border:1px solid #FBE3B0;border-radius:12px;margin-bottom:16px;font-size:12px;color:#92400E;line-height:1.5}
.warn-banner b{color:#7C2D12}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .2s ease both}
.btn-export{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid #2563EB;border-radius:8px;background:#EEF1FF;color:#1D4ED8;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-left:auto;flex-shrink:0}
.btn-export:hover{background:#2563EB;color:#fff;box-shadow:0 3px 8px rgba(37,99,235,.3)}

function moKey(s){var p=String(s||'').split("'");if(p.length===2){var i=MN.indexOf(p[0]);if(i>=0)return parseInt('20'+p[1])*12+i;}return -1;}
function Nf(n){return n?(Number(n)||0).toLocaleString('en-IN'):'-';}
function Nfw(n){return (Number(n)||0).toLocaleString('en-IN');}
function clamp01(v){return Math.max(0,Math.min(1,isFinite(v)?v:0));}
function moToQuarter(mo){
  var p=mo.match(/(\w+)'(\d+)/);if(!p)return null;
  var idx=MN.indexOf(p[1]),yr=parseInt(p[2],10);
  var fy=(idx>=3)?(yr+1):yr;
  var q=(idx>=3&&idx<=5)?1:(idx>=6&&idx<=8)?2:(idx>=9)?3:4;
  return 'Q'+q+"'FY"+(fy<10?'0'+fy:fy);
}
var _charts={};
function mkChart(ref,id,cfg){
  if(_charts[id]){_charts[id].destroy();delete _charts[id];}
  if(ref.current){_charts[id]=new Chart(ref.current,cfg);}
}
function downloadCSV(filename,rows){
  var csv=rows.map(function(r){return r.map(function(c){var s=String(c==null?'':c);return s.indexOf(',')>=0||s.indexOf('"')>=0?'"'+s.replace(/"/g,'""')+'"':s;}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function ExportBtn(props){

}
function FilterSel(props){

  return ce('select',{className:'sel',value:props.value,onChange:function(e){props.onChange(e.target.value);}},

      var lbl=typeof o==='object'?o.label:o;
      return ce('option',{key:val,value:val},lbl);
    })
  );
}

/* ENGINE: Direct Fuel-Split Waterfall (VAHAN ICE/EV -> Segment -> Model)
   Bajaj sells exactly one EV / one scooter: Chetak EV. Every other model
   in the lineup is an ICE motorcycle. Vahan retail is reported with
   separate ICE and EV columns per state-month, so the Scooter vs
   Motorcycle split here is already exact and needs no fallback tiers:
     Scooter retail(s,t)    = VAHAN EV(s,t)   -> 100% to Chetak EV
     Motorcycle retail(s,t) = VAHAN ICE(s,t)  -> split across ICE models
                               by their pan-India SIAM wholesale share
   SIAM State-wise OEM Wholesale (Motorcycles/Scooters category) is kept
   as its own informational tab (supply-side context) but does not feed
   the retail split math, since it would add no extra resolution beyond
   what the VAHAN ICE/EV columns already give directly. */
var ENGINE=(function(){
'use strict';
var SEGMENTS=['Scooter','Motorcycle'];

var modelSeg={},modelWsAgg={};
MRE_MODEL_WS.forEach(function(r){
  modelSeg[r.mod]=r.seg;
  if(!modelWsAgg[r.mod])modelWsAgg[r.mod]={};
  modelWsAgg[r.mod][r.mo]=(modelWsAgg[r.mod][r.mo]||0)+r.ws;
});
var allModels=Object.keys(modelSeg);
var allModelWsMos=Array.from(new Set(MRE_MODEL_WS.map(function(r){return r.mo;}))).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(a)-moKey(b);});

var natSegMo={};
allModelWsMos.forEach(function(mo){
  natSegMo[mo]={Scooter:0,Motorcycle:0};
  allModels.forEach(function(mod){
    var seg=modelSeg[mod];
    natSegMo[mo][seg]=(natSegMo[mo][seg]||0)+((modelWsAgg[mod]&&modelWsAgg[mod][mo])||0);
  });
});

var modelShr={};
allModelWsMos.forEach(function(mo){
  modelShr[mo]={};
  allModels.forEach(function(mod){
    var seg=modelSeg[mod];
    var segTot=natSegMo[mo][seg]||0;
    var ws=(modelWsAgg[mod]&&modelWsAgg[mod][mo])||0;
    modelShr[mo][mod]=segTot>0?ws/segTot:0;
  });
});

var modelWsMoSet=new Set(allModelWsMos);
function getProxyModelMo(mo){
  if(modelWsMoSet.has(mo))return mo;
  var k=moKey(mo),best=null,bestK=-1;
  for(var i=0;i<allModelWsMos.length;i++){var mk=moKey(allModelWsMos[i]);if(mk<=k&&mk>bestK){bestK=mk;best=allModelWsMos[i];}}
  return best;
}

var stateQSeg={},stateQList={};
MRE_STATE_SEG_WS.forEach(function(r){
  if(!stateQSeg[r.st])stateQSeg[r.st]={};
  if(!stateQSeg[r.st][r.q])stateQSeg[r.st][r.q]={Scooter:0,Motorcycle:0};
  stateQSeg[r.st][r.q][r.seg]=(stateQSeg[r.st][r.q][r.seg]||0)+r.ws;
});
function qKey(q){var m=q.match(/Q(\d)'FY(\d+)/);return m?(+m[2])*10+(+m[1]):0;}
Object.keys(stateQSeg).forEach(function(st){
  stateQList[st]=Object.keys(stateQSeg[st]).filter(function(q){
    var d=stateQSeg[st][q];return (d.Scooter+d.Motorcycle)>0;
  }).sort(function(a,b){return qKey(a)-qKey(b);});
});
var allStateQuarters=Array.from(new Set(MRE_STATE_SEG_WS.map(function(r){return r.q;}))).sort(function(a,b){return qKey(a)-qKey(b);});

var vhnAgg={},vhnFuel={};
MRE_VHN.forEach(function(r){
  if(!vhnAgg[r.st])vhnAgg[r.st]={};
  vhnAgg[r.st][r.mo]=(vhnAgg[r.st][r.mo]||0)+r.ice+r.ev;
  if(!vhnFuel[r.st])vhnFuel[r.st]={};
  if(!vhnFuel[r.st][r.mo])vhnFuel[r.st][r.mo]={ICE:0,EV:0};
  vhnFuel[r.st][r.mo].ICE+=r.ice;
  vhnFuel[r.st][r.mo].EV+=r.ev;
});
var allVhnSts=Array.from(new Set(MRE_VHN.map(function(r){return r.st;}))).sort();
var allVhnMos=Array.from(new Set(MRE_VHN.map(function(r){return r.mo;}))).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(a)-moKey(b);});

function getSegShare(st,mo){
  var f=(vhnFuel[st]&&vhnFuel[st][mo])||{ICE:0,EV:0};
  var tot=f.ICE+f.EV;
  var share={Scooter:tot>0?f.EV/tot:0,Motorcycle:tot>0?f.ICE/tot:0};
  return{share:share,tier:"Exact - VAHAN ICE/EV Split",q:moToQuarter(mo),fuel:f};
}

var segRetail={},segTier={};
allVhnSts.forEach(function(st){
  segRetail[st]={};segTier[st]={};
  allVhnMos.forEach(function(mo){
    var f=(vhnFuel[st]&&vhnFuel[st][mo])||{ICE:0,EV:0};
    segRetail[st][mo]={Scooter:f.EV,Motorcycle:f.ICE};
    segTier[st][mo]="Exact - VAHAN ICE/EV Split";
  });
});

var vhnMoCount={};
MRE_VHN.forEach(function(r){
  if(!vhnMoCount[r.st])vhnMoCount[r.st]={};
  vhnMoCount[r.st][r.mo]=true;
});
var dataCompleteness={};
allVhnSts.forEach(function(st){
  var have=vhnMoCount[st]?Object.keys(vhnMoCount[st]).length:0;
  dataCompleteness[st]={have:have,expected:allVhnMos.length,pct:have/allVhnMos.length};
});

var predRet={};
allVhnSts.forEach(function(st){
  predRet[st]={};
  allVhnMos.forEach(function(mo){
    predRet[st][mo]={};
    var pMo=getProxyModelMo(mo);
    var mShr=modelShr[pMo]||{};
    SEGMENTS.forEach(function(seg){
      var segModels=allModels.filter(function(m){return modelSeg[m]===seg;});
      var segTotal=segRetail[st][mo][seg]||0;
      var shrTotal=segModels.reduce(function(s,m){return s+(mShr[m]||0);},0);
      var floatAlloc={},floors={},floorSum=0;
      segModels.forEach(function(m){
        var w=shrTotal>0?(mShr[m]||0)/shrTotal:1/segModels.length;
        floatAlloc[m]=segTotal*w;
        floors[m]=Math.floor(floatAlloc[m]);
        floorSum+=floors[m];
      });
      var remainder=Math.round(segTotal)-floorSum;
      var fracs=segModels.map(function(m){return{m:m,f:floatAlloc[m]-floors[m]};}).sort(function(a,b){return b.f-a.f;});
      var result={};segModels.forEach(function(m){result[m]=floors[m];});
      for(var i=0;i<remainder&&i<fracs.length;i++){result[fracs[i].m]++;}
      segModels.forEach(function(m){predRet[st][mo][m]=result[m];});
    });
  });
});

return{
  SEGMENTS:SEGMENTS,
  allModels:allModels,modelSeg:modelSeg,allModelWsMos:allModelWsMos,modelWsAgg:modelWsAgg,
  natSegMo:natSegMo,modelShr:modelShr,getProxyModelMo:getProxyModelMo,
  stateQSeg:stateQSeg,stateQList:stateQList,allStateQuarters:allStateQuarters,qKey:qKey,
  vhnAgg:vhnAgg,vhnFuel:vhnFuel,allVhnSts:allVhnSts,allVhnMos:allVhnMos,
  getSegShare:getSegShare,segRetail:segRetail,segTier:segTier,
  predRet:predRet,dataCompleteness:dataCompleteness
};
})();

function yearOf(mo){var p=mo.match(/(\w+)'(\d+)/);return p?'20'+p[2]:null;}

function segBadgeStyle(seg){
  return seg==='Scooter'?{background:'#EEF1FF',color:'#1D4ED8'}:{background:'#FFF0F2',color:'#E11D48'};
}

function DataGapBanner(){
  var{dataCompleteness,allVhnMos}=ENGINE;
  var gaps=Object.keys(dataCompleteness).map(function(st){return{st:st,d:dataCompleteness[st]};}).filter(function(x){return x.d.pct<0.9;}).sort(function(a,b){return a.d.pct-b.d.pct;});
  if(!gaps.length)return null;

      '. VAHAN retail rows are missing for most months in '+(gaps.length>1?'these states':'this state')+' in the source file (not a calculation issue) - predicted totals for '+(gaps.length>1?'them':'it')+' will read artificially low. Verify source file coverage before presenting state-level figures for '+(gaps.length>1?'these states':'this state')+'.'
    )
  );
}

/* TAB 4: Derived Segment Retail (direct VAHAN ICE/EV split) */
function SegmentRetailTab(){
  var{allVhnSts,allVhnMos,vhnAgg,segRetail,SEGMENTS}=ENGINE;
  var[expanded,setExpanded]=useState({});
  var revMos=useMemo(function(){return allVhnMos.slice().reverse();},[]);

  var kpis=useMemo(function(){

    allVhnSts.forEach(function(st){allVhnMos.forEach(function(mo){

      scooterTot+=d.Scooter||0;motoTot+=d.Motorcycle||0;
    });});
    var grand=scooterTot+motoTot;
    return{scooterTot:scooterTot,motoTot:motoTot,grand:grand,cells:allVhnSts.length*allVhnMos.length};

    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Derived Segment Retail (VAHAN EV -> Scooter, VAHAN ICE -> Motorcycle)'),
        ce(ExportBtn,{onClick:doExport})
      ),
      ce('div',{className:'grid-wrap page-scroll'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,ce('th',{className:'lc'},'State / Segment'),revMos.map(function(mo){return ce('th',{key:mo},mo);}),ce('th',null,'Total'))),
          ce('tbody',null,allVhnSts.map(function(st){
            var isOpen=!!expanded[st];

            if(!stTotal)return null;
            var stateRow=ce('tr',{key:st+'-hd',className:'tr-state',onClick:function(){toggleState(st);}},
              ce('td',{className:'lc'},ce('span',{style:{marginRight:6,fontSize:10}},isOpen?'v':'>'),st),
              revMos.map(function(mo){var v=(vhnAgg[st]&&vhnAgg[st][mo])||0;return ce('td',{key:mo},v?Nf(v):'-');}),
              ce('td',{style:{fontWeight:700,color:'#2563eb'}},Nf(stTotal))
            );
            var segRows=isOpen?SEGMENTS.map(function(seg){
              var segTot=revMos.reduce(function(s,mo){return s+Math.round((segRetail[st][mo]&&segRetail[st][mo][seg])||0);},0);
              return ce('tr',{key:st+'|'+seg,className:'tr-model'},

            }):[];
            return [stateRow].concat(segRows);

/* TAB 5: Model Retail Prediction (MAIN tab) */
function ModelRetailTab(){
  var{predRet,vhnAgg,allModels,modelSeg,allVhnMos,allVhnSts}=ENGINE;
  var[selSeg,setSelSeg]=useState('All');
  var[selModel,setSelModel]=useState('All');
  var[chartState,setChartState]=useState(allVhnSts[0]||'');
  var[expanded,setExpanded]=useState({});
  var barRef=useRef(null),lineRef=useRef(null);

  var revMos=useMemo(function(){return allVhnMos.slice().reverse();},[]);
  var filtMods=useMemo(function(){
    var base=selSeg==='All'?allModels:allModels.filter(function(m){return modelSeg[m]===selSeg;});
    return selModel==='All'?base:base.filter(function(m){return m===selModel;});
  },[selSeg,selModel]);

  function toggleState(st){setExpanded(function(p){var n=Object.assign({},p);n[st]=!n[st];return n;});}

  var kpis=useMemo(function(){
    var totV=0,totP=0;
    allVhnSts.forEach(function(st){
      allVhnMos.forEach(function(mo){
        totV+=(vhnAgg[st]&&vhnAgg[st][mo])||0;
        allModels.forEach(function(mod){totP+=(predRet[st]&&predRet[st][mo]&&predRet[st][mo][mod])||0;});
      });
    });
    return{totV:totV,totP:totP,gap:totV-totP,states:allVhnSts.length,months:allVhnMos.length};
  },[]);

  var chartData=useMemo(function(){
    return allVhnMos.map(function(mo){
      var vTotal=(vhnAgg[chartState]&&vhnAgg[chartState][mo])||0;
      var predTotal=allModels.reduce(function(s,mod){return s+((predRet[chartState]&&predRet[chartState][mo]&&predRet[chartState][mo][mod])||0);},0);
      return{mo:mo,vTotal:vTotal,predTotal:predTotal};
    });
  },[chartState]);

  useEffect(function(){
    if(!barRef.current)return;
    var lastN=chartData.slice(-12);
    var mods=filtMods.slice(0,6);
    var colors=['#2563eb','#16a34a','#dc2626','#d97706','#7c3aed','#0891b2'];
    mkChart(barRef,'mre-bar',{type:'bar',data:{labels:lastN.map(function(r){return r.mo;}),
      datasets:mods.map(function(mod,i){return{label:mod,data:lastN.map(function(r){return(predRet[chartState]&&predRet[chartState][r.mo]&&predRet[chartState][r.mo][mod])||0;}),backgroundColor:colors[i%colors.length],stack:'s'};})},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:10}}},scales:{x:{stacked:true,ticks:{font:{size:9}}},y:{stacked:true,ticks:{font:{size:9}}}}}});
  },[chartData,filtMods]);

  useEffect(function(){
    if(!lineRef.current)return;
    mkChart(lineRef,'mre-line',{type:'line',data:{labels:chartData.map(function(r){return r.mo;}),
      datasets:[{label:'VAHAN (ICE + EV)',data:chartData.map(function(r){return r.vTotal;}),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.1)',tension:.3,fill:true},
               {label:'Predicted (All Models)',data:chartData.map(function(r){return r.predTotal;}),borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.1)',tension:.3,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:10}}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}});
  },[chartData]);

  function doExport(){
    var hdr=['State','Month','VAHAN (ICE + EV)'].concat(filtMods).concat(['Predicted Total']);
    var rows=[hdr];
    allVhnSts.forEach(function(st){
      revMos.forEach(function(mo){
        var vt=(vhnAgg[st]&&vhnAgg[st][mo])||0;
        var row=[st,mo,vt];
        var pt=0;
        filtMods.forEach(function(mod){var v=(predRet[st]&&predRet[st][mo]&&predRet[st][mo][mod])||0;row.push(v);pt+=v;});
        row.push(pt);
        rows.push(row);
      });
    });
    downloadCSV('Bajaj_Model_Retail_Prediction.csv',rows);
  }

  return ce('div',{className:'fade-up'},
    ce(DataGapBanner,null),
    ce('div',{className:'kpi-grid'},
      [{l:'VAHAN Grand Total',v:Nf(kpis.totV),s:'all states - all months - actual (ICE + EV)'},
       {l:'Predicted Grand Total',v:Nf(kpis.totP),s:'Scooter + Motorcycle models'},
       {l:'Allocation Gap',v:Nf(kpis.gap),s:'rounding only - '+((kpis.gap/kpis.totV*100).toFixed(2))+'% of total'},
       {l:'Coverage',v:kpis.states+' states x '+kpis.months+' mo',s:'VAHAN dataset coverage'}]
      .map(function(k){return ce('div',{key:k.l,className:'kpi-card'},ce('div',{className:'kpi-label'},k.l),ce('div',{className:'kpi-value'},k.v),ce('div',{className:'kpi-sub'},k.s));})
    ),
    ce('div',{className:'card',style:{marginBottom:16}},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Trend Charts'),
        ce('span',{className:'filter-label',style:{marginLeft:8}},'State'),
        ce(FilterSel,{value:chartState,onChange:setChartState,options:allVhnSts})
      ),
      ce('div',{className:'chart-pair'},
        ce('div',{className:'chart-box'},ce('canvas',{ref:barRef})),
        ce('div',{className:'chart-box'},ce('canvas',{ref:lineRef}))
      )
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'State x Month Prediction Grid (Latest First)'),
        ce(ExportBtn,{label:'Export CSV',onClick:doExport})
      ),
      ce('div',{className:'filter-row',style:{marginBottom:12}},
        ce('span',{className:'filter-label'},'Segment'),
        ce(FilterSel,{value:selSeg,onChange:setSelSeg,options:['All','Scooter','Motorcycle']}),
        ce('span',{className:'filter-label'},'Model'),
        ce(FilterSel,{value:selModel,onChange:setSelModel,options:['All'].concat(filtMods)})
      ),
      ce('div',{className:'grid-wrap page-scroll'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,ce('th',{className:'lc'},'State / Model'),revMos.map(function(mo){return ce('th',{key:mo},mo);}),ce('th',null,'Total'))),
          ce('tbody',null,allVhnSts.map(function(st){
            var isOpen=!!expanded[st];
            var stTotal=revMos.reduce(function(s,mo){return s+((vhnAgg[st]&&vhnAgg[st][mo])||0);},0);
            if(!stTotal)return null;
            var stateRow=ce('tr',{key:st+'-hd',className:'tr-state',onClick:function(){toggleState(st);}},
              ce('td',{className:'lc'},ce('span',{style:{marginRight:6,fontSize:10}},isOpen?'v':'>'),st),
              revMos.map(function(mo){var v=(vhnAgg[st]&&vhnAgg[st][mo])||0;return ce('td',{key:mo},v?Nf(v):'-');}),
              ce('td',{style:{fontWeight:700,color:'#2563eb'}},Nf(stTotal))
            );
            var modelRows=isOpen?filtMods.map(function(mod){
              var modTotal=revMos.reduce(function(s,mo){return s+((predRet[st]&&predRet[st][mo]&&predRet[st][mo][mod])||0);},0);
              return ce('tr',{key:st+'|'+mod,className:'tr-model'},
                ce('td',{className:'lc'},mod),
                revMos.map(function(mo){var v=(predRet[st]&&predRet[st][mo]&&predRet[st][mo][mod])||0;return ce('td',{key:mo},v?Nf(v):'-');}),
                ce('td',{style:{color:'#6b7280'}},modTotal?Nf(modTotal):'-')
              );
            }):[];
            return[stateRow].concat(modelRows);
          }).filter(Boolean))
        )
      )
    )
  );
}

/* TAB 6: Engine Debug */
function EngineDebugTab(){
  var{allVhnSts,allVhnMos,vhnAgg,getSegShare,segRetail,allModels,modelSeg,modelShr,getProxyModelMo,predRet}=ENGINE;
  var[selSt,setSelSt]=useState(allVhnSts[0]||'');
  var[selMo,setSelMo]=useState(allVhnMos[allVhnMos.length-1]||'');
  var revMos=useMemo(function(){return allVhnMos.slice().reverse();},[]);

  var vTotal=(vhnAgg[selSt]&&vhnAgg[selSt][selMo])||0;
  var res=useMemo(function(){return getSegShare(selSt,selMo);},[selSt,selMo]);
  var pMo=useMemo(function(){return getProxyModelMo(selMo);},[selMo]);
  var segRet=segRetail[selSt][selMo];

  var modelRows=useMemo(function(){
    return allModels.map(function(mod){
      var seg=modelSeg[mod];
      var shr=(modelShr[pMo]&&modelShr[pMo][mod])||0;
      var pred=(predRet[selSt]&&predRet[selSt][selMo]&&predRet[selSt][selMo][mod])||0;
      return{mod:mod,seg:seg,shr:shr,pred:pred};
    });
  },[selSt,selMo]);

  var totalPred=modelRows.reduce(function(s,r){return s+r.pred;},0);
  var chetakPred=(predRet[selSt]&&predRet[selSt][selMo]&&predRet[selSt][selMo]['Chetak'])||0;

  return ce('div',{className:'fade-up'},
    ce('div',{className:'card',style:{marginBottom:16}},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Select State + Month to Trace'),
        ce('span',{className:'filter-label'},'State'),
        ce(FilterSel,{value:selSt,onChange:setSelSt,options:allVhnSts}),
        ce('span',{className:'filter-label'},'Month'),
        ce(FilterSel,{value:selMo,onChange:setSelMo,options:revMos})
      ),
      ce('div',{className:'signal-row'},
        ce('div',{className:'sig-item'},ce('span',null,'Fiscal Quarter (informational): '),ce('strong',null,res.q||'-')),
        ce('div',{className:'sig-item'},ce('span',null,'Proxy Model-WS Month: '),ce('strong',null,pMo)),
        ce('div',{className:'sig-item'},ce('span',{className:'badge tag-green'},res.tier))
      )
    ),
    ce('div',{className:'kpi-grid'},
      [{l:'VAHAN Total (ICE + EV)',v:Nf(vTotal),s:selSt+' - '+selMo},
       {l:'Scooter Share (= EV%)',v:(res.share.Scooter*100).toFixed(2)+'%',s:'Retail: '+Nf(Math.round(segRet.Scooter))},
       {l:'Motorcycle Share (= ICE%)',v:(res.share.Motorcycle*100).toFixed(2)+'%',s:'Retail: '+Nf(Math.round(segRet.Motorcycle))},
       {l:'Chetak EV Predicted',v:Nf(chetakPred),s:'Should equal Scooter retail exactly'}]
      .map(function(k){return ce('div',{key:k.l,className:'kpi-card'},ce('div',{className:'kpi-label'},k.l),ce('div',{className:'kpi-value'},k.v),ce('div',{className:'kpi-sub'},k.s));})
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},ce('div',{className:'card-title'},'Model-Level Trace - Pan-India Monthly Model Share x Derived Segment Retail')),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc'},'Model'),ce('th',null,'Segment'),ce('th',null,'Model Share (Pan-India, '+pMo+')'),ce('th',null,'Predicted Retail')
          )),
          ce('tbody',null,modelRows.map(function(r){
            return ce('tr',{key:r.mod},
              ce('td',{className:'lc'},r.mod),
              ce('td',null,ce('span',{className:'badge',style:segBadgeStyle(r.seg)},r.seg)),
              ce('td',null,(r.shr*100).toFixed(2)+'%'),
              ce('td',{style:{fontWeight:600}},r.pred?Nf(r.pred):'-')
            );
          })),
          ce('tfoot',null,ce('tr',null,ce('td',{className:'lc'},'Total (All Models)'),ce('td',null,'-'),ce('td',null,'-'),ce('td',null,Nf(totalPred))))
        )
      )
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},ce('div',{className:'card-title'},'Validation Checks')),
      ce('table',{className:'dg',style:{width:'100%'}},
        ce('tbody',null,
          [
            {label:'Segment shares sum to 100%?',ok:Math.abs(res.share.Scooter+res.share.Motorcycle-1)<0.001||vTotal===0,val:((res.share.Scooter+res.share.Motorcycle)*100).toFixed(2)+'%'},
            {label:'Predicted (all models) = Segment retail (both segments)?',ok:Math.abs(totalPred-Math.round(segRet.Scooter+segRet.Motorcycle))<=2,val:Nf(totalPred)+' vs '+Nf(Math.round(segRet.Scooter+segRet.Motorcycle))},
            {label:'Chetak EV predicted = VAHAN EV column exactly?',ok:chetakPred===Math.round(segRet.Scooter),val:Nf(chetakPred)+' vs '+Nf(Math.round(segRet.Scooter))},
            {label:'Segment split source',ok:true,val:res.tier}
          ].map(function(c,i){
            return ce('tr',{key:i},
              ce('td',{className:'lc',style:{width:'55%'}},c.label),
              ce('td',{style:{textAlign:'left',color:c.ok?'#166534':'#b42318',fontWeight:600}},c.ok?'OK ':'WARN ',c.val)
            );
          })
        )
      )
    )
  );
}
