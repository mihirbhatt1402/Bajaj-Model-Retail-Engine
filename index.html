<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bajaj Retail Engine - Bajaj Auto Ltd</title>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f6fa;color:#1e293b;min-height:100vh;font-size:13px}
.app-header{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 28px;background:#fff;border-bottom:1px solid #e4e6ef;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.header-left{display:flex;align-items:center;gap:14px}
.app-logo{width:36px;height:36px;background:linear-gradient(135deg,#002147,#E8560A);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.app-title{font-size:16px;font-weight:700;color:#1e293b;letter-spacing:-.02em}
.app-sub{font-size:10.5px;color:#6b7280;margin-top:1px}
.main-content{padding:22px 28px;max-width:1600px;margin:0 auto}
.subtab-nav{display:flex;gap:4px;background:#fff;border:1px solid #e4e6ef;border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content;flex-wrap:wrap}
.subtab-btn{padding:7px 16px;border:none;background:transparent;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:#6b7280;transition:all .15s;font-family:inherit;white-space:nowrap}
.subtab-btn.active{background:#1e293b;color:#fff;font-weight:600}
.subtab-btn:hover:not(.active){background:#f0f2f7;color:#1e293b}
.card{background:#fff;border:1px solid #e4e6ef;border-radius:10px;padding:16px;margin-bottom:16px}
.card-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-hdr .card-title{margin-bottom:0}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid #e4e6ef;border-radius:8px;padding:14px 16px;border-top:3px solid #2563eb}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#6b7280;font-weight:600;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:#1e293b;font-family:'Courier New',monospace;line-height:1}
.kpi-sub{font-size:10px;color:#94a3b8;margin-top:4px}
.stat-bar{display:flex;align-items:center;gap:16px;padding:12px 16px;background:#f8fafc;border:1px solid #e4e6ef;border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;font-weight:600}
.stat-val{font-size:16px;font-weight:700;color:#1e293b;font-family:'Courier New',monospace}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af}
.sel{padding:5px 10px;border:1px solid #e4e6ef;border-radius:6px;font-size:11.5px;background:#fff;color:#374151;cursor:pointer;font-family:inherit;outline:none}
.sel:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
/* ── Grid ── */
.grid-wrap{overflow-x:auto;overflow-y:visible;border:1px solid #e4e6ef;border-radius:8px}
.dg{border-collapse:collapse;font-size:11px;min-width:100%;background:#fff}
.dg th{background:#f8fafc;border-bottom:2px solid #e2e8f0;border-right:1px solid #eaecf0;padding:7px 10px;text-align:right;font-weight:600;color:#374151;white-space:nowrap;z-index:2}
.dg th.lc{text-align:left;position:sticky;left:0;z-index:3;background:#f8fafc;border-right:2px solid #e2e8f0;min-width:180px}
.dg td{border-bottom:1px solid #f0f2f7;border-right:1px solid #f0f2f7;padding:5px 10px;text-align:right;color:#374151;font-family:'Courier New',monospace;white-space:nowrap}
.dg td.lc{text-align:left;font-family:inherit;font-weight:500;color:#1e293b;position:sticky;left:0;z-index:1;background:inherit;border-right:2px solid #e2e8f0}
.dg tbody tr:hover td{background:#f8fafc!important}
.dg tfoot td{background:#1e293b!important;color:#fff;font-weight:700;border-color:#374151}
.dg tfoot td.lc{background:#1e293b!important;position:sticky;left:0;z-index:1}
/* ── Tree rows ── */
.tr-state td{background:#eef2ff!important;cursor:pointer;user-select:none}
.tr-state td.lc{background:#eef2ff!important;font-weight:700;color:#1e293b}
.tr-state:hover td{background:#e0e7ff!important}
.tr-model td{background:#fff}
.tr-model td.lc{padding-left:28px;color:#374151;font-size:10.5px}
/* ── Charts ── */
.chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{position:relative;height:250px}
@media(max-width:900px){.chart-pair{grid-template-columns:1fr}}
/* ── Signals / misc ── */
.signal-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#64748b;padding:10px 14px;background:#f8fafc;border-radius:7px;border:1px solid #e4e6ef;margin-bottom:12px}
.sig-item{display:flex;align-items:center;gap:5px}
.sig-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;background:#eff6ff;color:#2563eb}
.tag-amber{background:#fffbeb;color:#b45309}
.tag-green{background:#f0fdf4;color:#166534}
.data-label{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;font-size:11px;font-weight:600;color:#15803d}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .2s ease both}
.btn-export{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border:1px solid #2563eb;border-radius:6px;background:#eff6ff;color:#2563eb;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-left:auto;flex-shrink:0}
.btn-export:hover{background:#2563eb;color:#fff}
</style>
</head>

/* ── UTILS ───────────────────────────────────────────────────────── */
function moKey(s){var p=String(s||'').split("'");if(p.length===2){var i=MN.indexOf(p[0]);if(i>=0)return parseInt('20'+p[1])*12+i;}return -1;}
function Nf(n){return n?(Number(n)||0).toLocaleString('en-IN'):'-';}
function Nfw(n){return (Number(n)||0).toLocaleString('en-IN');}
function clamp01(v){return Math.max(0,Math.min(1,isFinite(v)?v:0));}
function mkChart(ref,id,cfg){
  var c=document.getElementById(id);if(!c)return;
  if(ref.current){try{ref.current.destroy();}catch(e){}ref.current=null;}
  try{ref.current=new Chart(c,cfg);}catch(e){console.error('[Chart]',e.message);}
}

/* ── CSV EXPORT ──────────────────────────────────────────────────── */
function downloadCSV(filename, rows){
  /* rows = array of arrays; first array = headers */
  var csv=rows.map(function(r){
    return r.map(function(v){
      var s=String(v==null?'':v);
      return(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',');
  }).join('\r\n');
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function ExportBtn({onClick}){
  return ce('button',{className:'btn-export',onClick:onClick},'⬇ Export CSV');
}

/* ── SHARED: FilterSel ───────────────────────────────────────────── */
function FilterSel({label,value,onChange,options}){
  return ce('div',{className:'filter-row',style:{gap:6}},
    ce('span',{className:'filter-label'},label),
    ce('select',{className:'sel',value,onChange:function(e){onChange(e.target.value);}},
      options.map(function(o){var v=typeof o==='string'?o:o.value;var l=typeof o==='string'?o:o.label;return ce('option',{key:v,value:v},l);})
    )
  );
}

/* ── SHARED: TreeGrid ────────────────────────────────────────────── */
/* groups: [{id, label, totals:{moId:n}, children:[{id,label,data:{moId:n}}]}]
   cols:   [{id, label}]                                               */
function TreeGrid({groups,cols,footerLabel,initExpanded}){
  var[expanded,setExpanded]=useState(function(){
    var s=new Set();
    if(initExpanded){groups.forEach(function(g){s.add(g.id);});}
    return s;
  });

  function toggle(id){
    setExpanded(function(prev){
      var next=new Set(prev);
      if(next.has(id))next.delete(id);else next.add(id);
      return next;
    });
  }

  /* grand total per column */
  var grandTot={};
  cols.forEach(function(c){
    grandTot[c.id]=groups.reduce(function(s,g){return s+(g.totals[c.id]||0);},0);
  });
  var grandTotTotal=cols.reduce(function(s,c){return s+(grandTot[c.id]||0);},0);

  /* build flat row array */
  var bodyRows=[];
  groups.forEach(function(g){
    var isExp=expanded.has(g.id);
    var rowTot=cols.reduce(function(s,c){return s+(g.totals[c.id]||0);},0);
    if(!rowTot)return; /* skip states with zero data */
    bodyRows.push(
      ce('tr',{key:g.id,className:'tr-state',onClick:function(){toggle(g.id);}},
        ce('td',{className:'lc'},
          ce('span',{style:{marginRight:5,fontSize:9,color:'#6366f1'}},isExp?'▼':'▶'),
          g.label
        ),
        cols.map(function(c){var v=g.totals[c.id]||0;return ce('td',{key:c.id,style:{fontWeight:600,color:v?'#1e293b':'#d1d5db'}},v?Nf(v):'-');}),
        ce('td',{style:{fontWeight:700,color:'#2563eb'}},Nf(rowTot))
      )
    );
    if(isExp){
      g.children.forEach(function(ch){
        var chTot=cols.reduce(function(s,c){return s+(ch.data[c.id]||0);},0);
        if(!chTot)return;
        bodyRows.push(
          ce('tr',{key:ch.id,className:'tr-model'},
            ce('td',{className:'lc tr-model'},ch.label),
            cols.map(function(c){var v=ch.data[c.id]||0;return ce('td',{key:c.id,style:{color:v?'inherit':'#d1d5db'}},v?Nf(v):'-');}),
            ce('td',{style:{fontWeight:600,color:'#6366f1'}},Nf(chTot))
          )
        );
      });
    }
  });

  return ce('div',{className:'grid-wrap'},
    ce('table',{className:'dg'},
      ce('thead',null,ce('tr',null,
        ce('th',{className:'lc'},footerLabel||'State / Model'),
        cols.map(function(c){return ce('th',{key:c.id},c.label);}),
        ce('th',null,'Total')
      )),
      ce('tbody',null,bodyRows),
      ce('tfoot',null,ce('tr',null,
        ce('td',{className:'lc'},'Grand Total'),
        cols.map(function(c){return ce('td',{key:c.id},Nfw(grandTot[c.id]||0));}),
        ce('td',null,Nfw(grandTotTotal))
      ))
    )
  );
}


/* ══════════════════════════════════════════════════════════════════
 *  TAB 1 — ORGANIC GENERATION  (State → Model tree)
 * ══════════════════════════════════════════════════════════════════ */
function OrganicGenTab(){
  var[selYear,setSelYear]=useState('All');
  var[selState,setSelState]=useState('All');

  /* all unique months / states / models from ORG_ROWS */
  var allMonths=useMemo(function(){
    var s=new Set();ORG_ROWS.forEach(function(r){if(r.month)s.add(r.month);});
    return Array.from(s).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(b)-moKey(a);});
  },[]);
  var allStates=useMemo(function(){var s=new Set();ORG_ROWS.forEach(function(r){s.add(r.state);});return Array.from(s).sort();},[]);
  var allModels=useMemo(function(){var s=new Set();ORG_ROWS.forEach(function(r){s.add(r.model);});return Array.from(s).sort();},[]);
  var years=useMemo(function(){var s=new Set();allMonths.forEach(function(m){var p=m.match(/(\w+)'(\d+)/);if(p)s.add('20'+p[2]);});return Array.from(s).sort().reverse();},[allMonths]);

  /* apply state filter */
  var filtRows=useMemo(function(){
    if(selState==='All')return ORG_ROWS;
    return ORG_ROWS.filter(function(r){return r.state===selState;});
  },[selState]);

  /* stateModelAgg[state][model][month] = generation */
  var stateModelAgg=useMemo(function(){
    var o={};
    filtRows.forEach(function(r){
      if(!o[r.state])o[r.state]={};
      if(!o[r.state][r.model])o[r.state][r.model]={};
      o[r.state][r.model][r.month]=(o[r.state][r.model][r.month]||0)+r.generation;
    });
    return o;
  },[filtRows]);

  /* month filter */
  var filtMos=useMemo(function(){
    if(selYear==='All')return allMonths;
    return allMonths.filter(function(m){var p=m.match(/(\w+)'(\d+)/);return p&&'20'+p[2]===selYear;});
  },[selYear,allMonths]);

  /* build groups for TreeGrid */
  var groups=useMemo(function(){
    var statesShown=selState==='All'?allStates:[selState];
    return statesShown.map(function(st){
      var stateData=stateModelAgg[st]||{};
      /* state totals per month */
      var totals={};
      filtMos.forEach(function(mo){
        totals[mo]=allModels.reduce(function(s,m){return s+((stateData[m]&&stateData[m][mo])||0);},0);
      });
      /* children: models with any data in this state */
      var children=allModels
        .filter(function(m){return stateData[m]&&Object.keys(stateData[m]).length>0;})
        .map(function(m){
          var data={};filtMos.forEach(function(mo){data[mo]=(stateData[m]&&stateData[m][mo])||0;});
          return{id:st+'__'+m,label:m,data:data};
        });
      return{id:st,label:st,totals:totals,children:children};
    });
  },[stateModelAgg,filtMos,allModels,allStates,selState]);

  var cols=useMemo(function(){return filtMos.map(function(mo){return{id:mo,label:mo};});},[filtMos]);
  var totalGen=useMemo(function(){return ORG_ROWS.reduce(function(s,r){return s+r.generation;},0);},[]);

  function doExport(){
    var statesShown=selState==='All'?allStates:[selState];
    var header=['State','Model',...filtMos,'Total'];
    var csvRows=[header];
    statesShown.forEach(function(st){
      var sd=stateModelAgg[st]||{};
      /* state subtotal row */
      var stTot=filtMos.map(function(mo){return allModels.reduce(function(s,m){return s+((sd[m]&&sd[m][mo])||0);},0);});
      csvRows.push([st,'(All Models)',...stTot,stTot.reduce(function(a,b){return a+b;},0)]);
      /* model rows */
      allModels.forEach(function(m){
        if(!sd[m])return;
        var vals=filtMos.map(function(mo){return(sd[m]&&sd[m][mo])||0;});
        var tot=vals.reduce(function(a,b){return a+b;},0);
        if(!tot)return;
        csvRows.push([st,m,...vals,tot]);
      });
    });
    var ts=new Date().toISOString().slice(0,10);
    downloadCSV('Organic_Generation_'+ts+'.csv',csvRows);
  }

  return ce('div',{className:'fade-up'},
    ce('div',{className:'stat-bar'},
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'Total Organic Leads'),ce('div',{className:'stat-val'},Nfw(totalGen))),
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'Models'),ce('div',{className:'stat-val'},allModels.length)),
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'Months'),ce('div',{className:'stat-val'},allMonths.length)),
      ce('div',{className:'stat-item'},ce('div',{className:'stat-label'},'States'),ce('div',{className:'stat-val'},allStates.length)),
      ce('div',{className:'data-label'},'✓ Bajaj Organic Unique Generation')
    ),
    ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Organic Generation — State × Model × Month'),
        ce(FilterSel,{label:'Year',value:selYear,onChange:setSelYear,
          options:[{value:'All',label:'All Years'},...years.map(function(y){return{value:y,label:y};})]}),
        ce(FilterSel,{label:'State',value:selState,onChange:setSelState,
          options:[{value:'All',label:'All States'},...allStates.map(function(s){return{value:s,label:s};})]}),
        ce(ExportBtn,{onClick:doExport})
      ),
      ce('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:10}},
        'Click a state row to expand/collapse its models. State row = sum of all models.'),
      ce(TreeGrid,{groups:groups,cols:cols,footerLabel:'State / Model',initExpanded:false})
    )
  );
}

  var allModels=useMemo(function(){return Object.keys(wsAgg).sort();},[wsAgg]);

  var commonMonths=useMemo(function(){
    var vMos=new Set();VHN_ROWS.forEach(function(r){if(r.month)vMos.add(r.month);});
    return Array.from(vMos).filter(function(m){return moKey(m)>0;}).sort(function(a,b){return moKey(b)-moKey(a);});
  },[]);

  var years=useMemo(function(){
    var s=new Set();commonMonths.forEach(function(m){var p=m.match(/(\w+)'(\d+)/);if(p)s.add('20'+p[2]);});
    return Array.from(s).sort().reverse();
  },[commonMonths]);

  var filtMos=useMemo(function(){
    var mos=selYear==='All'?commonMonths:commonMonths.filter(function(m){var p=m.match(/(\w+)'(\d+)/);return p&&'20'+p[2]===selYear;});
    return mos.slice(0,36);
  },[selYear,commonMonths]);

  var moTotalWS=useMemo(function(){
    var t={};
    commonMonths.forEach(function(mo){t[mo]=Object.values(wsAgg).reduce(function(s,m){return s+(m[mo]||0);},0);});
    return t;
  },[wsAgg,commonMonths]);

  var mosSorted=useMemo(function(){return commonMonths.slice().sort(function(a,b){return moKey(a)-moKey(b);});},[commonMonths]);

  /* ── Step 1: Wholesale share with fallback to most recent WS month (UNCHANGED) ── */
  function getWholesaleShare(model,mo){
    var modelWS=(wsAgg[model]||{})[mo]||0;
    var totalWS=moTotalWS[mo]||0;
    if(!totalWS){
      var idx=mosSorted.indexOf(mo);
      for(var fi=idx-1;fi>=0;fi--){
        var fm=mosSorted[fi];
        if(moTotalWS[fm]>0){modelWS=(wsAgg[model]||{})[fm]||0;totalWS=moTotalWS[fm];break;}
      }
    }
    return totalWS>0?modelWS/totalWS:0;
  }

  /* ── Step 2: State-aware lead affinity + acceleration ── */
  function getStateLeadAffinity(model,mo,moIdx){
    var genNow=(orgAgg[mo]||{})[model]||0;
    var moTotal=orgTotalByMo[mo]||0;
    /* StateAffinity: this model's share of total pan-India organic leads this month */
    var stateAffinity=moTotal>0?clamp01(genNow/moTotal):1/Math.max(allModels.length,1);
    /* LeadAcceleration: leads vs 3-month rolling avg */
    var prev3=moIdx>=3?mosSorted.slice(moIdx-3,moIdx):mosSorted.slice(0,Math.max(0,moIdx));
    var avgGen=prev3.length?prev3.reduce(function(s,m){return s+((orgAgg[m]||{})[model]||0);},0)/prev3.length:genNow;
    var leadAccel=avgGen>0?clamp01((genNow/avgGen-0.5)/1.5):0.5;
    /* Fallback: no lead data at all → neutral 0.5 */
    if(!moTotal&&!genNow)return 0.5;
    return clamp01(0.6*stateAffinity+0.4*leadAccel);
  }

  /* ── Step 3: Model-sensitive supply (Change 1) ── */
  function moToQuarter(mo){
    var p=mo.match(/^(\w+)'(\d+)$/);if(!p)return null;
    var mn=MN.indexOf(p[0]);var yy=p[1];if(mn<0)return null;
    if(mn<=2)return"Jan-Mar'"+yy;
    if(mn<=5)return"Apr-Jun'"+yy;
    if(mn<=8)return"Jul-Sep'"+yy;
    return"Oct-Dec'"+yy;
  }

  /* ── Step 4: Hybrid model-state momentum ── */
  function getMomentum(model,st,mo,moIdx,prevPreds){
    var stateRetail=(vhnAgg[st]||{})[mo]||0;
    /* StateGrowth: current vs 6-month rolling state average */
    var prev6=moIdx>=6?mosSorted.slice(moIdx-6,moIdx):mosSorted.slice(0,Math.max(0,moIdx));
    var avgSR=prev6.length?prev6.reduce(function(s,m){return s+((vhnAgg[st]||{})[m]||0);},0)/prev6.length:stateRetail;
    var stateGrowth=clamp01(avgSR>0?(stateRetail/avgSR-0.5)/1.5:0.5);
    /* ModelShareLag: this model's share of prev-month's state retail */
    var prevMo=moIdx>0?mosSorted[moIdx-1]:null;
    var prevVhn=prevMo?((vhnAgg[st]||{})[prevMo]||0):0;
    var prevPred=prevPreds&&prevMo?(prevPreds[model]||0):0;
    if(prevVhn>0&&prevPred>0){
      var modelShareLag=clamp01(prevPred/prevVhn);
      return clamp01(0.6*modelShareLag+0.4*stateGrowth);
    }
    /* Fallback: use Wm-weighted state growth when no prior prediction */
    return stateGrowth;
  }

  /* ── Precompute fleet conversion ratio per month (needed for dynamic Qm) ── */
  var fleetConvByMo=useMemo(function(){
    var o={};
    mosSorted.forEach(function(mo,moIdx){
      var prev6=moIdx>=6?mosSorted.slice(moIdx-6,moIdx):mosSorted.slice(0,moIdx);
      if(prev6.length<3){o[mo]=null;return;}
      var totalR=0,totalO=0;
      allModels.forEach(function(model){
        prev6.forEach(function(m){
          var wm=getWholesaleShare(model,m);
          totalR+=((vhnAgg['__ALL__']||{})[m]||0)*wm;
          totalO+=(orgAgg[m]||{})[model]||0;
        });
      });
      o[mo]=totalO>0?totalR/totalO:null;
    });
    return o;
  },[mosSorted,allModels,wsAgg,moTotalWS,vhnAgg,orgAgg]);

  /* ── Dynamic lead quality Qm (Change 3) — falls back to static if <3 months history ── */
  function getLeadQuality(model,mo,moIdx){
    var staticQm=STATIC_QM[model]||1.0;
    var prev6=moIdx>=6?mosSorted.slice(moIdx-6,moIdx):mosSorted.slice(0,moIdx);
    if(prev6.length<3)return staticQm;
    var fleetConv=fleetConvByMo[mo];
    if(!fleetConv)return staticQm;
    var totalR=0,totalO=0;
    prev6.forEach(function(m){
      totalR+=((vhnAgg['__ALL__']||{})[m]||0)*getWholesaleShare(model,m);
      totalO+=(orgAgg[m]||{})[model]||0;
    });
    if(totalO<1)return staticQm;
    return Math.max(0.4,Math.min(2.0,staticQm*(totalR/totalO)/fleetConv));
  }

  /* ── Core: predict all models for one (state, month) — guarantees Σ = VAHAN(s,t) ── */
  /* prevPreds: {model:value} from the immediately preceding month, or null for first month */
  function predictMonthState(st,mo,prevPreds){
    var stateRetail=(vhnAgg[st]||{})[mo]||0;
    var result={};
    allModels.forEach(function(m){result[m]=0;});
    if(!stateRetail)return result;

    var moIdx=mosSorted.indexOf(mo);

    /* Step 3: StateSupply(s,t) then multiply by Wm; normalize across models */
    var q=moToQuarter(mo);
    var stateOEM=q?((oemSwAgg[st]||{})[q]||0):0;
    var totalOEM=q?(oemSwQTot[q]||0):0;
    var stateSupply=totalOEM>0?stateOEM/totalOEM:0;
    var rawSupply={},supplySum=0;
    allModels.forEach(function(model){
      var s=stateSupply*getWholesaleShare(model,mo);
      rawSupply[model]=s;supplySum+=s;
    });

    /* RawWeight(m,s,t) = (0.25×Wm + 0.38×Ws + 0.22×Supply_norm + 0.15×Momentum) × Qm */
    var rawWeights={},weightSum=0,maxW=-1,maxMod=null;
    allModels.forEach(function(model){
      var wm=getWholesaleShare(model,mo);
      var ws=getStateLeadAffinity(model,mo,moIdx);
      var supply=supplySum>0?(rawSupply[model]/supplySum):1/Math.max(allModels.length,1);
      /* Step 4: model-specific momentum uses previous month's prediction share */
      var momentum=getMomentum(model,st,mo,moIdx,prevPreds||null);
      var qm=getLeadQuality(model,mo,moIdx);
      var rw=Math.max(0,(0.25*wm+0.38*ws+0.22*supply+0.15*momentum)*qm);
      rawWeights[model]=rw;weightSum+=rw;
      if(rw>maxW){maxW=rw;maxMod=model;}
    });

    /* Fallback: uniform WS-weighted allocation if all weights zero */
    if(!weightSum){
      allModels.forEach(function(model){
        var w=Math.max(getWholesaleShare(model,mo),1/Math.max(allModels.length,1));
        rawWeights[model]=w;weightSum+=w;
      });
      maxMod=allModels[0];
    }

    /* Step 8: Normalize — Prediction(m,s,t) = VAHAN(s,t) × RawWeight / ΣRawWeight */
    var allocTotal=0;
    allModels.forEach(function(model){
      var pred=Math.floor(stateRetail*(rawWeights[model]/weightSum));
      result[model]=pred;allocTotal+=pred;
    });
    /* Assign rounding residual to highest-weight model to enforce exact sum */
    var residual=stateRetail-allocTotal;
    if(residual&&maxMod)result[maxMod]=(result[maxMod]||0)+residual;
    return result;
  }

  /* ── Full prediction cache: computed chronologically so ModelShareLag(t-1) is available ── */
  var fullPredCache=useMemo(function(){
    var cache={};
    allStates.forEach(function(st){cache[st]={};});
    /* mosSorted is oldest→newest; iterate in order so prevPreds is always ready */
    mosSorted.forEach(function(mo,moIdx){
      allStates.forEach(function(st){
        var prevMo=moIdx>0?mosSorted[moIdx-1]:null;
        var prevPreds=prevMo?(cache[st][prevMo]||null):null;
        cache[st][mo]=predictMonthState(st,mo,prevPreds);
      });
    });
    return cache;
  },[allStates,mosSorted,vhnAgg,wsAgg,moTotalWS,orgAgg,orgTotalByMo,oemSwAgg,oemSwQTot,fleetConvByMo,allModels]);

  /* ── Filtered states/models per dropdowns ── */
  var visStates=useMemo(function(){return selState==='All'?allStates:[selState];},[selState,allStates]);
  var visModels=useMemo(function(){return selModel==='All'?allModels:[selModel];},[selModel,allModels]);

  /* ── Prediction tree for TreeGrid: [state][model][month] ── */
  var statePredTree=useMemo(function(){
    var o={};
    visStates.forEach(function(st){
      o[st]={};
      allModels.forEach(function(mod){o[st][mod]={};});
      filtMos.forEach(function(mo){
        var preds=(fullPredCache[st]&&fullPredCache[st][mo])||{};
        allModels.forEach(function(mod){o[st][mod][mo]=preds[mod]||0;});
      });
    });
    return o;
  },[visStates,allModels,filtMos,fullPredCache]);

  /* groups for TreeGrid (unchanged) */
  var predGroups=useMemo(function(){
    return visStates.map(function(st){
      var totals={};
      filtMos.forEach(function(mo){
        totals[mo]=visModels.reduce(function(s,mod){return s+((statePredTree[st]&&statePredTree[st][mod]&&statePredTree[st][mod][mo])||0);},0);
      });
      var children=visModels.map(function(mod){
        var data={};filtMos.forEach(function(mo){data[mo]=(statePredTree[st]&&statePredTree[st][mod]&&statePredTree[st][mod][mo])||0;});
        return{id:st+'__'+mod,label:mod,data:data};
      });
      return{id:st,label:st,totals:totals,children:children};
    });
  },[visStates,visModels,filtMos,statePredTree]);

  var predCols=useMemo(function(){return filtMos.map(function(mo){return{id:mo,label:mo};});},[filtMos]);

  /* ── Pan-India predictions = true sum across all states (enforces allocation constraint) ── */
  var panPredByModel=useMemo(function(){
    var out={};
    allModels.forEach(function(mod){
      out[mod]={};
      filtMos.forEach(function(mo){
        out[mod][mo]=allStates.reduce(function(s,st){
          return s+((fullPredCache[st]&&fullPredCache[st][mo]&&fullPredCache[st][mo][mod])||0);
        },0);
      });

    return out;
  },[allModels,filtMos,allStates,fullPredCache]);

  var accRows=useMemo(function(){
    var st=selState==='All'?'__ALL__':selState;
    return filtMos.map(function(mo){
      var actual=(vhnAgg[st]||{})[mo]||0;
      var pred=visModels.reduce(function(s,mod){
        var v=selState==='All'?(panPredByModel[mod]&&panPredByModel[mod][mo]||0)
          :(statePredTree[st]&&statePredTree[st][mod]&&statePredTree[st][mod][mo]||0);
        return s+v;
      },0);
      var v=actual>0?(pred-actual)/actual*100:null;

  var kpiPred=accRows.reduce(function(s,r){return s+r.pred;},0);
  var kpiActual=accRows.reduce(function(s,r){return s+r.actual;},0);
  var kpiVar=kpiActual>0?(kpiPred-kpiActual)/kpiActual*100:null;
  var kpiMods=visModels.filter(function(m){return filtMos.some(function(mo){return (panPredByModel[m]||{})[mo]>0;});}).length;

  /* ── Additional KPIs ── */
  var kpiConfidence=useMemo(function(){
    var total=0,confident=0;
    allStates.forEach(function(st){
      filtMos.forEach(function(mo){
        total++;

        var sigs=[
          allModels.some(function(m){return (orgAgg[mo]||{})[m]>0;}),
          (moTotalWS[mo]||0)>0,
          ((vhnAgg[st]||{})[mo]||0)>0,
          !!(q&&(oemSwAgg[st]||{})[q]>0)
        ].filter(Boolean).length;
        if(sigs>=3)confident++;
      });
    });
    return total>0?Math.round(confident/total*100):0;
  },[allStates,filtMos,allModels,orgAgg,moTotalWS,vhnAgg,oemSwAgg]);

  var kpiAllocError=useMemo(function(){
    var maxErr=0;
    allStates.forEach(function(st){
      filtMos.forEach(function(mo){
        var vhn=(vhnAgg[st]||{})[mo]||0;
        if(!vhn)return;
        var predSum=allModels.reduce(function(s,mod){return s+((fullPredCache[st]&&fullPredCache[st][mo]&&fullPredCache[st][mo][mod])||0);},0);
        var err=Math.abs(vhn-predSum);
        if(err>maxErr)maxErr=err;
      });
    });
    return maxErr;
  },[allStates,filtMos,vhnAgg,allModels,fullPredCache]);

  var kpiTopRising=useMemo(function(){

  var kpiSupplyConstrained=useMemo(function(){

      ),
      ce('div',{className:'kpi-card',style:{borderTopColor:kpiAllocError===0?'#16a34a':'#dc2626'}},
        ce('div',{className:'kpi-label'},'Allocation Error'),
        ce('div',{className:'kpi-value',style:{fontSize:20,color:kpiAllocError===0?'#16a34a':'#dc2626'}},kpiAllocError===0?'0 ✓':Nfw(kpiAllocError)),
        ce('div',{className:'kpi-sub'},'Max |Σ Pred − VAHAN| per state-month')
      ),
      ce('div',{className:'kpi-card',style:{borderTopColor:'#0891b2'}},
        ce('div',{className:'kpi-label'},'Top Rising Models'),
        ce('div',{className:'kpi-value',style:{fontSize:13,color:'#0e7490',lineHeight:1.4,fontFamily:'inherit',marginTop:4}},kpiTopRising),
        ce('div',{className:'kpi-sub'},'Highest MoM growth vs prior month')
      ),
      ce('div',{className:'kpi-card',style:{borderTopColor:kpiSupplyConstrained>5?'#dc2626':kpiSupplyConstrained>0?'#d97706':'#16a34a'}},
        ce('div',{className:'kpi-label'},'Supply Constrained States'),
        ce('div',{className:'kpi-value',style:{fontSize:20,color:kpiSupplyConstrained>5?'#dc2626':kpiSupplyConstrained>0?'#d97706':'#16a34a'}},kpiSupplyConstrained),
        ce('div',{className:'kpi-sub'},'States below 50% of avg OEM share')
      )
    ),

    /* ── Charts ── */
    filtMos.length>0&&ce('div',{className:'chart-pair'},
      ce('div',{className:'card',style:{marginBottom:0}},
        ce('div',{className:'card-title'},'Actual vs Predicted · '+(selState==='All'?'Pan India':selState)),
        ce('div',{className:'chart-box'},ce('canvas',{id:'mre_c1'}))
      ),
      ce('div',{className:'card',style:{marginBottom:0}},
        ce('div',{className:'card-title'},'Predicted by Model'),
        ce('div',{className:'chart-box'},ce('canvas',{id:'mre_c2'}))
      )
    ),

    /* ── 1. Prediction Grid — State × Model tree ── */
    filtMos.length>0&&predGroups.length>0&&ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},
          'Prediction Grid — State × Model × Month'+(selState!=='All'?' · '+selState:' · Pan India')),
        ce(ExportBtn,{onClick:doExportPredGrid})
      ),
      ce('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:10}},
        'Click a state row to expand/collapse models. State row = sum of model predictions for that state. Discount 0.93–1.00 (v1.1 accuracy uplift).'),
      ce(TreeGrid,{groups:predGroups,cols:predCols,footerLabel:'State / Model',initExpanded:false})
    ),

    /* ── 2. Actual vs Predicted grid ── */
    filtMos.length>0&&ce('div',{className:'card'},
      ce('div',{className:'card-hdr'},
        ce('div',{className:'card-title'},'Actual vs Predicted — Month by Month'),
        ce(ExportBtn,{onClick:doExportAccuracy})
      ),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc',style:{minWidth:90}},'Month'),
            ce('th',null,'Vaahan Actual'),
            ce('th',null,'Predicted'),
            ce('th',null,'Difference'),
            ce('th',null,'Variance %'),
            ce('th',null,'Status')
          )),
          ce('tbody',null,accRows.map(function(r,ri){
            var bg=ri%2===0?'#fff':'#f8fafc';
            var vc=r.v===null?'#9ca3af':r.v<-10?'#dc2626':r.v<-5?'#d97706':'#166534';
            var status=r.v===null?'—':r.v<-10?'⚠ Review':r.v<-5?'◑ Acceptable':'✓ On Track';
            var diff=r.pred-r.actual;
            return ce('tr',{key:r.mo,style:{background:bg}},
              ce('td',{className:'lc',style:{background:bg,fontWeight:600}},r.mo),
              ce('td',null,Nfw(r.actual)),ce('td',null,Nfw(r.pred)),
              ce('td',{style:{color:diff<0?'#dc2626':'#16a34a'}},diff?((diff>0?'+':'')+Nfw(diff)):'-'),
              ce('td',{style:{color:vc,fontWeight:600}},r.v!==null?(r.v>0?'+':'')+r.v.toFixed(1)+'%':'—'),
              ce('td',{style:{color:vc,fontWeight:500}},status)
            );
          })),
          ce('tfoot',null,ce('tr',null,
            ce('td',{className:'lc'},'Total'),
            ce('td',null,Nfw(kpiActual)),ce('td',null,Nfw(kpiPred)),
            ce('td',{style:{color:kpiPred<kpiActual?'#dc2626':'#16a34a',fontWeight:700}},
              kpiPred-kpiActual?(((kpiPred-kpiActual)>0?'+':'')+Nfw(kpiPred-kpiActual)):'-'),
            ce('td',{style:{fontWeight:700,color:kpiVar!==null?(kpiVar<-10?'#dc2626':kpiVar<-5?'#d97706':'#166534'):'#6b7280'}},
              kpiVar!==null?(kpiVar>0?'+':'')+kpiVar.toFixed(1)+'%':'—'),
            ce('td',null,'')
          ))
        )
      )
    ),

    /* ── 3. State Momentum Overview ── */
    selState==='All'&&filtMos.length>1&&ce('div',{className:'card'},
      ce('div',{className:'card-title'},'State Momentum Overview — Bajaj Vahan Retails MoM % — Pan India'),
      ce('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:10}},
        'Month-on-month growth in Bajaj state retails. Positive = improving momentum (Signal 1 in prediction).'),
      ce('div',{className:'grid-wrap'},
        ce('table',{className:'dg'},
          ce('thead',null,ce('tr',null,
            ce('th',{className:'lc'},'State'),
            filtMos.slice(0,12).map(function(mo){return ce('th',{key:mo},mo);}),
            ce('th',null,'Trend')
          )),
          ce('tbody',null,
            allStates.map(function(st,ri){
              var bg=ri%2===0?'#fff':'#f8fafc';
              var vals=filtMos.slice(0,12).map(function(mo){return(vhnAgg[st]||{})[mo]||0;});
              var hasAny=vals.some(function(v){return v>0;});if(!hasAny)return null;
              var moms=vals.map(function(v,i){
                if(i===vals.length-1)return null;
                var prev=vals[i+1];return prev>0?(v-prev)/prev*100:null;
              });
              var avgMom=moms.filter(function(m){return m!==null;});
              var trend=avgMom.length?avgMom.reduce(function(s,v){return s+v;},0)/avgMom.length:0;
              return ce('tr',{key:st,style:{background:bg}},
                ce('td',{className:'lc',style:{background:bg}},st),
                vals.map(function(v,i){
                  var mom=moms[i];
                  var cellBg=mom===null?undefined:mom>5?'rgba(22,163,74,.08)':mom<-5?'rgba(220,38,38,.08)':undefined;
                  return ce('td',{key:i,style:{background:cellBg}},
                    v?Nf(v):'-',
                    mom!==null&&ce('div',{style:{fontSize:9,color:mom>5?'#16a34a':mom<-5?'#dc2626':'#9ca3af',fontFamily:'inherit',lineHeight:1}},
                      (mom>0?'+':'')+mom.toFixed(1)+'%')
                  );
                }),
                ce('td',{style:{fontWeight:600,color:trend>0?'#16a34a':trend<0?'#dc2626':'#9ca3af'}},
                  (trend>0?'↑ +':'↓ ')+trend.toFixed(1)+'%')
              );
            }).filter(Boolean)
          )
        )
      )
    )
  );
}

/* ══════════════════════════════════════════════════════════════════
 *  MAIN APP
 * ══════════════════════════════════════════════════════════════════ */
const TABS=[
  {id:'engine',    label:'Model Retail Engine', icon:'🔮'},
  {id:'organic',   label:'Organic Generation',  icon:'📊'},
  {id:'vaahan',    label:'State Wise Retails',   icon:'🗺️'},
  {id:'wholesale', label:'Model Wise Wholesale', icon:'📦'},
  {id:'oemsw',     label:'Statewise OEM Wholesale', icon:'🏭'},
];

function App(){
  var[tab,setTab]=useState('engine');
  function renderTab(){
    if(tab==='engine')    return ce(RetailEngineTab,null);
    if(tab==='organic')   return ce(OrganicGenTab,null);
    if(tab==='vaahan')    return ce(VaahanRetailTab,null);
    if(tab==='wholesale') return ce(WholesaleTab,null);
    if(tab==='oemsw')     return ce(OEMStatewiseTab,null);
    return null;
  }
  return ce('div',null,
    ce('header',{className:'app-header'},
      ce('div',{className:'header-left'},
        ce('div',{className:'app-logo',style:{fontSize:10,fontWeight:900,letterSpacing:'-0.05em'}},'BAJ'),
        ce('div',null,
          ce('div',{className:'app-title'},'Model Retail Engine v'+VERSION),
          ce('div',{className:'app-sub'},'Retail Prediction Engine - Bajaj Auto')
        )
      ),
      ce('div',{style:{display:'flex',alignItems:'center',gap:10}},
        ce('div',{className:'badge tag-green'},'✓ All Signals Active'),
        ce('div',{className:'badge tag-amber'},"Vaahan Jan'25–May'26 · WS Apr'23–Apr'26 · Org Oct'24–May'26"),
        ce('div',{style:{fontSize:11,color:'#6b7280'}},'React 18 · Chart.js 4')
      )
    ),
    ce('div',{className:'main-content'},
      ce('div',{className:'subtab-nav'},
        TABS.map(function(t){
          return ce('button',{key:t.id,className:'subtab-btn'+(tab===t.id?' active':''),onClick:function(){setTab(t.id);}},
            t.icon+' '+t.label);
        })
      ),
      renderTab()
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(ce(App,null));
</script>
</body>
